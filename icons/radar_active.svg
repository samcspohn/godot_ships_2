<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <!-- Outer circle (radar screen border) -->
  <circle cx="32" cy="32" r="26" stroke="#00B4A0" stroke-width="3"/>

  <!-- Crosshairs -->
  <line x1="6" y1="32" x2="58" y2="32" stroke="#00B4A0" stroke-width="2" opacity="0.4"/>
  <line x1="32" y1="6" x2="32" y2="58" stroke="#00B4A0" stroke-width="2" opacity="0.4"/>

  <!-- Concentric range rings -->
  <circle cx="32" cy="32" r="16" stroke="#00B4A0" stroke-width="2" opacity="0.6"/>
  <circle cx="32" cy="32" r="8"  stroke="#00B4A0" stroke-width="2" opacity="0.6"/>

  <!-- Sweep arm (pointing upper-right ~45°) -->
  <line x1="32" y1="32" x2="50" y2="14" stroke="#00B4A0" stroke-width="4" stroke-linecap="round"/>

  <!-- Center dot -->
  <circle cx="32" cy="32" r="3" fill="#00B4A0"/>

  <!-- Target blip (upper-left quadrant, between rings) -->
  <circle cx="18" cy="22" r="3" fill="#00B4A0"/>
</svg>
